<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Sukie Xie | Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root {
            --bg-black: #000000;
            --text-white: #FFFFFF;
            --accent-yellow: #FFD700;
            --text-gray: #A1A1A6;
            --highlight-orange: #FF6B00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            color: var(--text-white);
            overflow-x: hidden;
            line-height: 1.5;
            /* 允许基础交互，仅禁用长按弹出菜单 */
            -webkit-touch-callout: none;
        }
        
        img {
            -webkit-user-drag: none;
            pointer-events: auto;
        }

        nav {
            position: fixed;
            top: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; z-index: 1000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .logo { font-weight: 800; font-size: 18px; }
        .btn-touch { 
            background: var(--accent-yellow); color: black; padding: 6px 15px; 
            border-radius: 20px; font-weight: bold; text-decoration: none; font-size: 12px;
        }

        section {
            min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center;
            padding: 80px 8% 40px; border-bottom: 1px solid #111; position: relative; overflow: hidden;
        }

        .section-bg {
            position: absolute; top: -15%; left: -10%; width: 120%; height: 130%;
            background-size: cover; background-position: center; opacity: 0.12;
            z-index: 0; filter: blur(15px); pointer-events: none;
        }
        
        .content-grid, .hero-content { z-index: 1; position: relative; width: 100%; }

        .hero { text-align: center; }
        .hero-content { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hello-title { font-size: clamp(40px, 8vw, 90px); font-weight: 800; letter-spacing: 2px; color: var(--accent-yellow); margin-bottom: 20px; }
        .im-name { display: flex; align-items: center; justify-content: center; gap: 15px; font-size: clamp(28px, 5vw, 70px); font-weight: 800; margin-bottom: 30px; flex-wrap: wrap; }
        .avatar-box { width: clamp(70px, 9vw, 100px); height: clamp(70px, 9vw, 100px); background: #2D2D2D; border-radius: 24px; overflow: hidden; border: 2px solid #444; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .hero-desc { max-width: 600px; font-size: 15px; color: var(--text-gray); margin: 0 auto; line-height: 1.6; }

        .content-grid { display: grid; grid-template-columns: 0.9fr 1.4fr; gap: 40px; align-items: center; max-width: 1400px; }
        .content-grid.img-left { grid-template-columns: 1.4fr 0.9fr; }

        .project-text { padding-right: 10px; }
        .tag-line { color: var(--accent-yellow); font-size: 12px; font-weight: bold; margin-bottom: 8px; }
        .brand-h { font-size: clamp(20px, 2.5vw, 32px); font-weight: 800; margin-bottom: 12px; }
        .sub-h { font-size: 14px; font-weight: 600; margin-bottom: 15px; display: block; color: var(--text-white); }
        ul li { position: relative; padding-left: 18px; margin-bottom: 8px; font-size: 13px; color: var(--text-gray); text-align: justify; list-style: none; }
        ul li::before { content: "•"; position: absolute; left: 0; color: var(--highlight-orange); font-weight: bold; }
        .footer-text { font-size: 11px; color: var(--text-gray); border-top: 1px solid #222; padding-top: 12px; line-height: 1.4; }

        .carousel-container {
            position: relative; width: 100%; height: 60vh; overflow: hidden; border-radius: 20px;
            background: #111; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .carousel-slides { display: flex; width: 100%; height: 100%; transition: transform 0.5s ease; }
        .carousel-slide { flex: 0 0 100%; position: relative; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: contain; background: #000; }

        /* 移动端点击适配：让查看大图按钮在手机上更易点 */
        .hover-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.3); 
            display: flex; align-items: center; justify-content: center;
            z-index: 20; 
        }
        .view-detail-btn {
            background: var(--accent-yellow); color: black; padding: 10px 20px; 
            border-radius: 30px; font-weight: 800; font-size: 13px; border: none;
            cursor: pointer; position: relative; z-index: 30;
        }

        .carousel-btn {
            position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none;
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 50; 
        }
        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }

        /* 斯维诗滑动修复 */
        .swisse-scroll-track {
            display: flex; gap: 20px; width: 100%; padding: 10px 0 30px;
            overflow-x: auto; overflow-y: hidden;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch; /* 核心：开启 iOS 惯性滑动 */
        }
        .swisse-card { flex-shrink: 0; scroll-snap-align: start; }
        .swisse-card-landscape { width: 85vw; }
        .swisse-card-portrait { width: 70vw; }
        .swisse-card-img { width: 100%; height: 35vh; border-radius: 15px; overflow: hidden; position: relative; }
        .swisse-card-img img { width: 100%; height: 100%; object-fit: cover; }

        /* 灯箱 */
        .lightbox-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 10000; display: none; align-items: center; justify-content: center;
        }
        .lightbox-overlay.active { display: flex; }
        .lightbox-overlay img { max-width: 95%; max-height: 90%; object-fit: contain; }
        .modal-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; background: none; border: none; z-index: 10001; }

        .lazy-img { opacity: 0; transition: opacity 0.5s ease; }
        .lazy-img.loaded { opacity: 1; }

        @media (max-width: 1024px) {
            .content-grid { display: flex; flex-direction: column; }
            .carousel-container { height: 40vh; }
            section { padding: 80px 5% 40px; }
            .hero-desc { font-size: 13px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">SUKIE.X</div>
        <a href="mailto:your@email.com" class="btn-touch">Connect</a>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <div class="hello-title">HELLO!</div>
            <div class="im-name">
                <span>I'M</span>
                <div class="avatar-box">
                    <img src="https://i.ibb.co/k6Qk3Ywq/IMG-1014.png" alt="Avatar">
                </div>
                <span>SUKIE XIE</span>
            </div>
            <div class="hero-desc">
                拥有10年数字营销行业经验，具备从策略规划到项目落地的全链路管理能力。<br>
                在工作之外，对经济周期与半导体行业有长期观察与好奇。
            </div>
        </div>
    </section>

    <section>
        <div class="content-grid">
            <div class="project-text">
                <p class="tag-line">BlueFocus | 2014-2024</p>
                <h2 class="brand-h">宝洁 品牌长期服务</h2>
                <ul>
                    <li>主导行业首款“免洗护发素”上市，助推京东搜索增长 200%。</li>
                    <li>推出「会说话的护发素」，吸引李佳琦亲自选品推荐。</li>
                </ul>
            </div>
            <div class="carousel-container" id="carousel1">
                <div class="carousel-slides">
                    <div class="carousel-slide">
                        <img class="lazy-img" data-src="https://i.postimg.cc/ZRBSZMPS/piao-rou1.png" alt="1">
                        <div class="hover-overlay"><button class="view-detail-btn" onclick="openLightbox('https://i.postimg.cc/ZRBSZMPS/piao-rou1.png')">查看大图</button></div>
                    </div>
                    <div class="carousel-slide">
                        <img class="lazy-img" data-src="https://i.postimg.cc/jdrb0vL6/piao-rou2.png" alt="2">
                        <div class="hover-overlay"><button class="view-detail-btn" onclick="openLightbox('https://i.postimg.cc/jdrb0vL6/piao-rou2.png')">查看大图</button></div>
                    </div>
                </div>
                <button class="carousel-btn prev" onclick="moveSlide('carousel1', -1)">◀</button>
                <button class="carousel-btn next" onclick="moveSlide('carousel1', 1)">▶</button>
            </div>
        </div>
    </section>

    <section>
        <div class="swisse-wrapper">
            <div class="swisse-header">
                <p class="tag-line">LIFESTYLE & SOCIAL</p>
                <h2 class="brand-h">斯维诗</h2>
            </div>
            <div class="swisse-scroll-track">
                <div class="swisse-card swisse-card-landscape">
                    <div class="swisse-card-img">
                        <img class="lazy-img" data-src="https://i.postimg.cc/9Q1GGx6D/si-wei-shi2.png" alt="S1">
                        <div class="hover-overlay"><button class="view-detail-btn" onclick="openLightbox('https://i.postimg.cc/9Q1GGx6D/si-wei-shi2.png')">查看大图</button></div>
                    </div>
                </div>
                <div class="swisse-card swisse-card-portrait">
                    <div class="swisse-card-img">
                        <img class="lazy-img" data-src="https://i.postimg.cc/DzZ15rht/si-wei-shi1.png" alt="S2">
                        <div class="hover-overlay"><button class="view-detail-btn" onclick="openLightbox('https://i.postimg.cc/DzZ15rht/si-wei-shi1.png')">查看大图</button></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="lightbox-overlay" id="lightboxModal" onclick="closeLightbox()">
        <button class="modal-close">✕</button>
        <img id="lightboxImg" src="">
    </div>

    <script>
        // 简化的轮播逻辑
        const carouselStates = {};
        function moveSlide(id, direction) {
            if(!carouselStates[id]) carouselStates[id] = 0;
            const container = document.getElementById(id);
            const slides = container.querySelector('.carousel-slides');
            const total = slides.children.length;
            carouselStates[id] = (carouselStates[id] + direction + total) % total;
            slides.style.transform = `translateX(-${carouselStates[id] * 100}%)`;
        }

        // 强力懒加载修复
        function initLazyLoad() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(en => {
                    if(en.isIntersecting) {
                        const img = en.target;
                        img.src = img.getAttribute('data-src');
                        img.onload = () => img.classList.add('loaded');
                        // 兜底：如果加载失败也显示
                        img.onerror = () => img.classList.add('loaded');
                        obs.unobserve(img);
                    }
                });
            }, {rootMargin: "200px"});
            document.querySelectorAll('.lazy-img').forEach(el => obs.observe(el));
        }

        // 灯箱修复
        function openLightbox(src) {
            const modal = document.getElementById('lightboxModal');
            document.getElementById('lightboxImg').src = src;
            modal.classList.add('active');
        }
        function closeLightbox() {
            document.getElementById('lightboxModal').classList.remove('active');
        }

        window.onload = () => {
            initLazyLoad();
            // 解决移动端点击延迟
            document.addEventListener('touchstart', function(){}, {passive: true});
        };
    </script>
</body>
</html>
